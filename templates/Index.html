<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Namkeen Batch - Lectures</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Orbitron:wght@500;700;900&display=swap" rel="stylesheet">
    
    <!-- Plyr Player CSS & JS -->
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    <script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>

    <style>
        :root { 
            /* NEW THEME: Cyberpunk Neon Cyan & Indigo */
            --bg-home: #09090e; 
            --bg-quiz: #050508; 
            --primary: #00e5ff; /* Neon Cyan */
            --primary-glow: rgba(0, 229, 255, 0.5);
            --secondary: #6366f1; /* Indigo */
            --text: #f0fdf4;
            --border: 1px solid rgba(0, 229, 255, 0.25);
            --plyr-color-main: #00e5ff; /* Player theme color */
        }
        * { box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; outline: none; }
        
        body { background: var(--bg-home); color: var(--text); font-family: 'Poppins', sans-serif; margin: 0; height: 100vh; overflow: hidden; position: relative; transition: background 0.6s ease; }

        /* DOOR TRANSITION (Kept from original) */
        .door-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 9999; pointer-events: none; }
        .door-panel { position: absolute; top: 0; width: 100%; height: 100%; background: #000; transition: transform 0.6s cubic-bezier(0.8, 0, 0.2, 1); }
        .door-left { left: 0; transform: translateX(-100%); clip-path: polygon(0 0, 60% 0, 40% 30%, 70% 40%, 30% 60%, 60% 70%, 40% 100%, 0 100%); border-right: 2px solid var(--primary); }
        .door-right { right: 0; transform: translateX(100%); clip-path: polygon(100% 0, 60% 0, 40% 30%, 70% 40%, 30% 60%, 60% 70%, 40% 100%, 100% 100%); border-left: 2px solid var(--primary); }
        .door-closed .door-left, .door-closed .door-right { transform: translateX(0); }
        .door-closed { pointer-events: all; }
        .door-closed::after { content: ''; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 4px; height: 100%; background: var(--primary); box-shadow: 0 0 40px var(--primary); opacity: 1; animation: crackFlash 0.5s infinite alternate; z-index: 10000; }
        @keyframes crackFlash { from { opacity: 0.4; height: 0%; } to { opacity: 1; height: 100%; } }

        .screen { display: none; flex-direction: column; height: 100%; padding: 20px; padding-bottom: 90px; overflow-y: auto; z-index: 5; position: relative; }
        
        /* STUDENT PROFILE CARD */
        .water-card { width: 100%; height: 120px; position: relative; overflow: hidden; background: #0a0a12; border: 1px solid rgba(99, 102, 241, 0.5); border-radius: 24px; display: flex; align-items: center; padding: 20px; margin-bottom: 25px; box-shadow: inset 0 0 30px rgba(0, 0, 0, 0.8), 0 5px 20px rgba(0,0,0,0.5); }
        .water-card::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(135deg, rgba(255,255,255,0.05) 0%, transparent 50%); z-index: 5; pointer-events: none; }
        .id-pic { width: 65px; height: 65px; border-radius: 50%; border: 2px solid var(--primary); object-fit: cover; margin-right: 15px; background: #000; z-index: 2; box-shadow: 0 0 15px var(--primary-glow); }

        /* BATCH BUTTON */
        .class-btn { width: 100%; padding: 35px 20px; background: linear-gradient(160deg, #0f101f, #05050a); border: 1px solid var(--secondary); border-radius: 24px; text-align: center; box-shadow: 0 0 25px rgba(99, 102, 241, 0.2); cursor: pointer; position: relative; overflow: hidden; transition: 0.3s; }
        .class-btn:active { transform: scale(0.97); }
        .class-btn::before { content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background: radial-gradient(circle, rgba(0, 229, 255, 0.1), transparent 60%); animation: spin 8s linear infinite; pointer-events: none; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        .class-text { font-family: 'Orbitron'; font-size: 1.8rem; font-weight: 900; color: var(--primary); letter-spacing: 2px; text-shadow: 0 0 10px var(--primary-glow); position: relative; z-index: 2; }

        /* DOCK */
        .dock-container { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 250px; height: 70px; background: rgba(10, 10, 15, 0.95); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); border-radius: 40px; display: flex; justify-content: space-around; align-items: center; box-shadow: 0 10px 40px rgba(0,0,0,0.8); z-index: 100; }
        .dock-item { font-size: 1.6rem; color: #444; transition: 0.3s; width: 55px; height: 55px; display: flex; justify-content: center; align-items: center; border-radius: 50%; }
        .active-dock { color: var(--primary); transform: translateY(-10px); text-shadow: 0 0 20px var(--primary-glow); background: rgba(0, 229, 255, 0.05); border: 1px solid rgba(0, 229, 255, 0.1); }

        .glass-box { background: rgba(255,255,255,0.03); border: var(--border); border-radius: 16px; padding: 18px; margin-bottom: 15px; cursor: pointer; transition: 0.2s; display: flex; align-items: center;}
        .glass-box:active { background: rgba(0, 229, 255, 0.1); }

        /* LECTURE ITEMS */
        .lecture-item { display: flex; align-items: center; justify-content: space-between; background: #0c0c14; padding: 18px; border-radius: 14px; margin-bottom: 12px; border: 1px solid #1f1f2e; cursor: pointer; transition: 0.2s;}
        .lecture-item:active { border-color: var(--primary); transform: scale(0.98); }
        .lec-title { font-weight: 600; font-size: 1rem; color: #fff; }
        .lec-sub { font-size: 0.75rem; color: var(--primary); margin-top: 5px; font-family: 'Orbitron'; }
        
        /* VIDEO PLAYER AREA */
        #video-container { width: 100%; border-radius: 16px; overflow: hidden; border: 1px solid var(--secondary); box-shadow: 0 10px 40px rgba(99, 102, 241, 0.3); background: #000; margin-bottom: 20px;}
    </style>
</head>
<body>

    <div id="door-overlay" class="door-overlay">
        <div class="door-panel door-left"></div>
        <div class="door-panel door-right"></div>
    </div>

    <!-- HOME SCREEN -->
    <div id="home-screen" class="screen" style="display:flex;">
        <h2 style="text-align:center; font-family:'Orbitron'; color:var(--primary); letter-spacing:2px; text-shadow:0 0 20px var(--primary-glow);">LEARNING HUB</h2>
        
        <div class="water-card">
            <img id="u-pic" class="id-pic" src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png">
            <div style="flex:1; z-index:10; padding-left:10px;">
                <div style="background:var(--secondary); color:white; padding:3px 10px; border-radius:6px; font-size:0.7rem; font-weight:800; font-family:'Orbitron'; display:inline-block; margin-bottom:5px;">PREMIUM STUDENT</div>
                <div id="u-name" style="font-size:1.3rem; font-weight:700; color:white;">Loading...</div>
            </div>
        </div>

        <div style="margin-top:10px;">
            <div class="class-btn" onclick="transitionTo(['Namkeen Batch'])">
                <div class="class-text">NAMKEEN BATCH 🍿</div>
                <div style="font-size:0.85rem; color:#aaa; margin-top:8px; font-weight:500;">CLICK TO EXPLORE LECTURES</div>
            </div>
        </div>
    </div>

    <!-- FOLDER SCREEN (Subjects / Chapters / Video List) -->
    <div id="folder-screen" class="screen">
        <h3 id="folder-title" style="text-align:center; font-family:'Orbitron'; color:var(--primary);">LIBRARY</h3>
        <div id="folder-list" style="flex:1; overflow-y:auto; margin-bottom: 20px;"></div>
        <button onclick="transitionTo(null, 'back')" style="width:100%; padding:15px; background:transparent; border:1px solid #444; border-radius:14px; color:#aaa; font-weight:600;">⬅️ GO BACK</button>
    </div>

    <!-- VIDEO PLAYER SCREEN -->
    <div id="video-screen" class="screen" style="padding: 0; background: #050508;">
        <div style="padding: 20px; display: flex; align-items: center; background: #09090e; border-bottom: 1px solid #1f1f2e; box-shadow: 0 4px 15px rgba(0,0,0,0.5);">
            <span onclick="closeVideo()" style="font-size: 1.4rem; color: var(--primary); cursor: pointer; margin-right: 15px; padding: 5px;">⬅️</span>
            <div id="vid-title" style="font-family: 'Poppins'; font-size: 1.1rem; font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">Loading...</div>
        </div>
        
        <div style="padding: 15px;">
            <!-- PLYR PLAYER -->
            <div id="video-container">
                <video id="player" playsinline controls></video>
            </div>

            <h4 style="color:var(--secondary); font-family: 'Orbitron'; margin-top: 10px;">STUDY MATERIAL</h4>
            <a id="pdf-btn" href="#" target="_blank" style="display: block; text-decoration: none;">
                <div class="glass-box" style="justify-content: center; text-align: center;">
                    <span style="font-size: 1.4rem; margin-right: 10px;">📄</span> 
                    <span style="color:white; font-weight: 600;">Download Class Notes (PDF)</span>
                </div>
            </a>
        </div>
    </div>

    <!-- PROFILE SCREEN -->
    <div id="profile-screen" class="screen">
        <h2 style="text-align:center; font-family:'Orbitron'; color:var(--primary);">PROFILE</h2>
        <div class="glass-box" onclick="tg.openTelegramLink('https://t.me/errorkid_05')" style="display:flex; align-items:center; cursor:pointer;">
            <span style="font-size:1.4rem; margin-right:15px;">📢</span> <span style="font-weight:600;">Join Official Channel</span>
        </div>
        <div class="glass-box" style="display:flex; align-items:center;">
            <span style="font-size:1.4rem; margin-right:15px;">👨‍💻</span> <span style="font-weight:600;">Developer Support</span>
        </div>
    </div>

    <!-- DOCK BAR (Removed Leaderboard) -->
    <div class="dock-container">
        <div class="dock-item active-dock" onclick="tab('home', this)">🏠</div>
        <div class="dock-item" onclick="tab('profile', this)">👤</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand(); 
        tg.setHeaderColor('#09090e');
        
        const user = tg.initDataUnsafe.user || {id: 123, first_name: "Student"};
        if(document.getElementById('u-name')) { document.getElementById('u-name').innerText = user.first_name; }
        if(user.photo_url && document.getElementById('u-pic')) { document.getElementById('u-pic').src = user.photo_url; }

        let fullData = {};
        let path = [];
        let player;

        // Fetch Data from Backend
        fetch('/api/get_data')
            .then(res => res.json())
            .then(data => fullData = data)
            .catch(err => console.log("DB Get Error", err));

        // Initialize Plyr Video Player
        document.addEventListener('DOMContentLoaded', () => {
            player = new Plyr('#player', {
                controls: ['play-large', 'play', 'progress', 'current-time', 'duration', 'mute', 'volume', 'settings', 'fullscreen'],
                settings: ['speed'],
                speed: { selected: 1, options: [0.5, 0.75, 1, 1.25, 1.5, 2] }
            });
        });

        // Smart Door Transition Logic
        function transitionTo(p, action) {
            let door = document.getElementById('door-overlay');
            if(door) door.classList.add('door-closed');
            setTimeout(() => {
                if(action === 'back') { back(); } else { nav(p); }
                setTimeout(() => { if(door) door.classList.remove('door-closed'); }, 500);
            }, 600);
        }

        function tab(t, btn) {
            document.querySelectorAll('.screen').forEach(s=>s.style.display='none');
            let targetId = t==='profile' ? 'profile-screen' : 'home-screen';
            document.getElementById(targetId).style.display='flex';
            document.querySelectorAll('.dock-item').forEach(d=>d.classList.remove('active-dock'));
            if(btn) btn.classList.add('active-dock');
            document.querySelector('.dock-container').style.display = 'flex';
        }

        function nav(p) { 
            path=p; 
            document.querySelectorAll('.screen').forEach(s=>s.style.display='none');
            document.getElementById('folder-screen').style.display='flex';
            document.querySelector('.dock-container').style.display = 'none';
            renderFolder(); 
        }
        
        function back() { 
            if(path.length > 1) { 
                path.pop(); renderFolder(); 
            } else { 
                let homeBtn = document.querySelectorAll('.dock-item')[0]; 
                tab('home', homeBtn); 
            } 
        }
        
        function renderFolder() {
            let ref = fullData; 
            path.forEach(k => ref = ref[k]);
            let list = document.getElementById('folder-list'); 
            list.innerHTML = ''; 
            
            if(!ref) return;

            // Update Title
            document.getElementById('folder-title').innerText = path[path.length-1] || 'LIBRARY';

            if(ref.mode === 'video' && Array.isArray(ref.data)) {
                // Show Video Lectures List
                ref.data.forEach(vid => {
                    let d = document.createElement('div'); 
                    d.className = 'lecture-item';
                    d.innerHTML = `
                        <div>
                            <div class="lec-title">${vid.title}</div>
                            <div class="lec-sub">▶️ VIDEO LECTURE</div>
                        </div>
                        <span style="font-size: 1.5rem;">⏯️</span>
                    `;
                    d.onclick = () => playVideo(vid);
                    list.appendChild(d);
                });
            } else {
                // Show Folders (Subjects/Chapters)
                let keys = Object.keys(ref);
                keys.forEach(k => {
                    if (k === 'mode' || k === 'data') return;
                    let d = document.createElement('div'); 
                    d.className = 'glass-box';
                    d.innerHTML = `<span style="font-size:1.6rem; margin-right:15px; text-shadow: 0 0 10px var(--primary-glow);">📁</span> <span style="font-weight:600; font-size:1.1rem;">${k}</span>`;
                    d.onclick = () => { path.push(k); renderFolder(); };
                    list.appendChild(d);
                });
            }
        }

        function playVideo(vidInfo) {
            document.querySelectorAll('.screen').forEach(s => s.style.display='none');
            document.getElementById('video-screen').style.display = 'block';
            
            document.getElementById('vid-title').innerText = vidInfo.title;
            
            let pdfBtn = document.getElementById('pdf-btn');
            if(vidInfo.pdf && vidInfo.pdf !== "#") {
                pdfBtn.style.display = 'block';
                pdfBtn.href = vidInfo.pdf;
            } else {
                pdfBtn.style.display = 'none';
            }

            // Load & Play Video
            player.source = {
                type: 'video',
                sources: [{ src: vidInfo.url, type: 'video/mp4' }]
            };
            player.play();
        }

        function closeVideo() {
            player.pause();
            document.querySelectorAll('.screen').forEach(s => s.style.display='none');
            document.getElementById('folder-screen').style.display='flex';
        }
    </script>
</body>
</html>
