<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>Namkeen Batch</title>
    
    <!-- Telegram WebApp JS -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Orbitron:wght@500;700;900&display=swap" rel="stylesheet">
    
    <!-- 🔥 ARTPLAYER CDN -->
    <script src="https://cdn.jsdelivr.net/npm/artplayer/dist/artplayer.js"></script>

    <style>
        /* ==========================================
           🎨 PREMIUM THEME VARIABLES
        ========================================== */
        :root { 
            --bg-home: #09090e; --bg-quiz: #050508; 
            --primary: #00e5ff; --primary-glow: rgba(0, 229, 255, 0.4);
            --secondary: #6366f1; --text: #f0fdf4;
            --glass-bg: rgba(20, 20, 30, 0.6);
            --glass-border: rgba(255, 255, 255, 0.08);
        }
        * { box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; outline: none; margin:0; padding:0;}
        body { background: var(--bg-home); color: var(--text); font-family: 'Poppins', sans-serif; height: 100vh; overflow: hidden; position: relative;}

        /* ==========================================
           🚪 DOOR TRANSITION
        ========================================== */
        .door-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 99999; pointer-events: none; }
        .door-panel { position: absolute; top: 0; width: 100%; height: 100%; background: #000; transition: transform 0.6s cubic-bezier(0.8, 0, 0.2, 1); }
        .door-left { left: 0; transform: translateX(-100%); clip-path: polygon(0 0, 60% 0, 40% 30%, 70% 40%, 30% 60%, 60% 70%, 40% 100%, 0 100%); border-right: 2px solid var(--primary); }
        .door-right { right: 0; transform: translateX(100%); clip-path: polygon(100% 0, 60% 0, 40% 30%, 70% 40%, 30% 60%, 60% 70%, 40% 100%, 100% 100%); border-left: 2px solid var(--primary); }
        .door-closed .door-left, .door-closed .door-right { transform: translateX(0); }
        .door-closed { pointer-events: all; }
        .door-closed::after { content: ''; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 4px; height: 100%; background: var(--primary); box-shadow: 0 0 40px var(--primary); animation: crackFlash 0.5s infinite alternate; z-index: 10000; }
        @keyframes crackFlash { from { opacity: 0.4; height: 0%; } to { opacity: 1; height: 100%; } }

        /* 🔥 STRICT PORTRAIT OVERLAP FIX (70px margin from top X button) */
        .screen { 
            display: none; flex-direction: column; 
            position: absolute; 
            top: 70px !important; 
            left: 0; 
            width: 100%; 
            height: calc(100% - 70px) !important; 
            padding: 15px; 
            padding-top: 0px; 
            padding-bottom: 120px; 
            overflow-y: auto; overflow-x: hidden; z-index: 5;
        }

        /* ==========================================
           💧 WATER CARD & HOME EFFECTS
        ========================================== */
        .water-card { width: 100%; height: 160px; position: relative; overflow: hidden; background: #0a0a12; border: 1px solid rgba(0, 229, 255, 0.4); border-radius: 24px; display: flex; align-items: center; padding: 20px; margin-bottom: 25px; box-shadow: inset 0 0 30px rgba(0, 0, 0, 0.8), 0 5px 20px rgba(0,0,0,0.5); }
        #water-fill { position: absolute; bottom: 0; left: 0; width: 100%; height: 60%; background: linear-gradient(180deg, var(--primary) 0%, #0c4a6e 100%); z-index: 1; opacity: 0.5; animation: wave 4s ease-in-out infinite alternate; }
        @keyframes wave { 0% { transform: scaleY(0.9); } 100% { transform: scaleY(1.1); } }
        .water-card::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(135deg, rgba(255,255,255,0.08) 0%, transparent 50%); z-index: 5; pointer-events: none; }
        .id-pic { width: 70px; height: 70px; border-radius: 50%; border: 3px solid var(--primary); object-fit: cover; margin-right: 15px; background: #000; z-index: 2; box-shadow: 0 0 15px var(--primary-glow); }

        .class-btn { width: 100%; padding: 30px; background: linear-gradient(160deg, #0f101f, #05050a); border: 1px solid var(--primary); border-radius: 24px; text-align: center; box-shadow: 0 0 25px rgba(0, 229, 255, 0.1); cursor: pointer; position: relative; overflow: hidden; transition: 0.3s; margin-top: 10px; }
        .class-btn:active { transform: scale(0.97); }
        .class-btn::before { content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background: radial-gradient(circle, rgba(0, 229, 255, 0.15), transparent 60%); animation: spin 8s linear infinite; pointer-events: none; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        .class-text { font-family: 'Orbitron'; font-size: 2rem; font-weight: 900; color: var(--primary); letter-spacing: 2px; text-shadow: 0 0 10px var(--primary-glow); position: relative; z-index: 2; }

        /* ==========================================
           📂 GLASSMORPHISM LIBRARY (FOLDERS)
        ========================================== */
        .glass-box { background: var(--glass-bg); backdrop-filter: blur(10px); border: 1px solid var(--glass-border); border-radius: 16px; padding: 18px; margin-bottom: 15px; cursor: pointer; display: flex; align-items: center; transition: 0.3s; box-shadow: 0 5px 15px rgba(0,0,0,0.3);}
        .glass-box:active { transform: scale(0.98); }

        .lecture-item { display: flex; align-items: center; justify-content: space-between; background: var(--glass-bg); backdrop-filter: blur(12px); padding: 16px; border-radius: 16px; margin-bottom: 12px; border: 1px solid var(--glass-border); box-shadow: 0 4px 15px rgba(0,0,0,0.2); transition: 0.3s; cursor: pointer;}
        .lecture-item:active { transform: scale(0.98); background: rgba(0, 229, 255, 0.05); }
        .play-icon-wrapper { width: 40px; height: 40px; border-radius: 50%; background: rgba(0, 229, 255, 0.1); border: 1px solid var(--primary); display: flex; justify-content: center; align-items: center; margin-right: 15px; font-size: 1.1rem; box-shadow: 0 0 10px var(--primary-glow); flex-shrink: 0; }

        .back-btn-modern { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(10px); color: #ccc; border-radius: 20px; padding: 14px; text-align: center; font-weight: 600; margin-top: 15px; transition: 0.3s; display: flex; justify-content: center; align-items: center; gap: 8px; cursor: pointer;}
        .back-btn-modern:active { background: rgba(255,255,255,0.1); transform: scale(0.98); color: white;}

        /* ==========================================
           📱 DOCK & TOAST
        ========================================== */
        .dock-container { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 250px; height: 70px; background: rgba(10, 10, 15, 0.95); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); border-radius: 40px; display: flex; justify-content: space-around; align-items: center; box-shadow: 0 10px 40px rgba(0,0,0,0.8); z-index: 100; }
        .dock-item { font-size: 1.6rem; color: #444; transition: 0.3s; width: 55px; height: 55px; display: flex; justify-content: center; align-items: center; border-radius: 50%; cursor: pointer;}
        .active-dock { color: var(--primary); transform: translateY(-10px); text-shadow: 0 0 20px var(--primary-glow); background: rgba(0, 229, 255, 0.05); border: 1px solid rgba(0, 229, 255, 0.1); }

        #toast { position: fixed; bottom: -100px; left: 50%; transform: translateX(-50%); background: rgba(99, 102, 241, 0.95); color: white; padding: 12px 24px; border-radius: 30px; font-weight: bold; font-size: 0.9rem; transition: 0.4s; z-index: 99999; box-shadow: 0 5px 20px rgba(0,0,0,0.5); white-space: nowrap;}
        .show-toast { bottom: 100px !important; }

        /* ==========================================
           🎥 VIDEO PLAYER (ARTPLAYER CUSTOM CSS)
        ========================================== */
        .top-bar-glass { padding: 15px; display: flex; align-items: center; background: rgba(9, 9, 14, 0.85); backdrop-filter: blur(15px); border-bottom: 1px solid rgba(255,255,255,0.05); z-index:10; border-radius: 12px; margin-bottom: 15px;}
        
        #video-container { width: 100%; aspect-ratio: 16/9; border-radius: 16px; overflow: hidden; border: 1px solid rgba(0, 229, 255, 0.4); background: #000; margin-bottom: 15px; position: relative; box-shadow: 0 0 25px rgba(0, 229, 255, 0.15);}
        
        /* 🔥 MASTERSTROKE: -90 DEGREE ROTATION */
        /* 🔥 ASLI ROTATION FIX (ArtPlayer ki internal body ko target kiya) */
       /* 🔥 ASLI ROTATION FIX (Top 70px Telegram Header ke liye chhod diya) */
        .art-video-player.art-fullscreen-web {
            position: fixed !important; 
            top: calc(50vh + 35px) !important; /* Center ko 35px niche khiskaya */
            left: 50vw !important;
            width: calc(100vh - 70px) !important; /* Video ki width se 70px kam kar diya */
            height: 100vw !important;
            transform: translate(-50%, -50%) rotate(-90deg) !important;
            transform-origin: center center !important; 
            z-index: 999999 !important;
            border-radius: 0 !important; 
            margin: 0 !important;
            padding: 0 !important;
            max-width: none !important;
            max-height: none !important;
            background: #000 !important;
        }

        /* 🔥 KINARO SE BUTTONS DOOR RAKHNE KE LIYE (X and Dots Fix) */
        .tg-landscape .art-bottom {
            padding: 0 60px !important; 
            padding-bottom: 20px !important;
        }

        /* 🔥 CUSTOM DOUBLE TAP RIPPLE EFFECT */
        .seek-ripple-container {
            position: absolute; top: 0; width: 50%; height: 100%;
            display: none; justify-content: center; align-items: center;
            background: rgba(255,255,255,0.12); color: white; font-size: 1.8rem; font-weight: bold;
            z-index: 50; pointer-events: none;
            animation: fadeRipple 0.5s linear forwards;
        }
        .seek-left { left: 0; border-top-right-radius: 50%; border-bottom-right-radius: 50%; background: linear-gradient(90deg, rgba(255,255,255,0.18), transparent); }
        .seek-right { right: 0; border-top-left-radius: 50%; border-bottom-left-radius: 50%; background: linear-gradient(-90deg, rgba(255,255,255,0.18), transparent); }
        @keyframes fadeRipple { 0% { opacity: 1; transform:scale(0.9);} 100% { opacity: 0; transform:scale(1.1);} }

        /* ==========================================
           📚 LECTURE DETAILS & STUDY MATERIAL UI
        ========================================== */
        .now-playing-box { background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 14px; padding: 15px; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        .np-badge { font-size: 0.7rem; color: var(--primary); font-weight: 700; letter-spacing: 1px; margin-bottom: 5px; font-family: 'Orbitron';}
        .np-title { font-size: 1rem; color: white; font-weight: 600; line-height: 1.4; word-wrap: break-word;}

        .section-heading { font-size: 1.1rem; color: #fff; font-weight: 600; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; font-family: 'Orbitron'; }
        
        .action-buttons-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .action-btn-full { grid-column: span 2; }
        
        .premium-btn { position: relative; overflow: hidden; border-radius: 14px; font-weight: 600; font-family: 'Poppins'; display: flex; justify-content: center; align-items: center; gap: 8px; padding: 15px; cursor: pointer; transition: 0.3s; text-align: center; }
        .premium-btn:active { transform: scale(0.97); }
        .premium-btn::after { content: ''; position: absolute; top: 0; left: -100%; width: 50%; height: 100%; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent); animation: shine 4s infinite; }
        @keyframes shine { 0% { left: -100%; } 20% { left: 200%; } 100% { left: 200%; } }

        .btn-offline { background: linear-gradient(135deg, #0f172a, #082f49); border: 1px solid var(--primary); color: #fff; box-shadow: 0 4px 15px rgba(0, 229, 255, 0.2);}
        .btn-doc { background: linear-gradient(135deg, #1e1b4b, #312e81); border: 1px solid var(--secondary); color: #fff; box-shadow: 0 4px 15px rgba(99, 102, 241, 0.2);}
    </style>
</head>
<body>

    <div id="door-overlay" class="door-overlay">
        <div class="door-panel door-left"></div>
        <div class="door-panel door-right"></div>
    </div>
    <div id="toast">Message</div>

    <!-- 🏠 HOME SCREEN -->
    <div id="home-screen" class="screen" style="display:flex;">
        <h2 style="text-align:center; font-family:'Orbitron'; color:var(--primary); letter-spacing:2px; text-shadow:0 0 20px var(--primary-glow);">LEARNING HUB</h2>
        <div class="water-card">
            <div id="water-fill"></div>
            <img id="u-pic" class="id-pic" src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png">
            <div style="flex:1; z-index:10; padding-left:15px;">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <span style="background:var(--primary); color:black; padding:3px 10px; border-radius:6px; font-size:0.7rem; font-weight:800; font-family:'Orbitron';">PREMIUM</span>
                    <span style="color:#fff; font-size: 0.8rem; font-weight:bold; font-family:'Orbitron';">ACTIVE</span>
                </div>
                <div id="u-name" style="font-size:1.4rem; font-weight:700; margin:4px 0; color:white;">Loading...</div>
                <div style="width:100%; height:8px; background:rgba(0,0,0,0.5); border-radius:10px; overflow:hidden; border:1px solid rgba(0, 229, 255, 0.3); margin-top:8px;">
                    <div style="width:100%; height:100%; background:linear-gradient(90deg, #00e5ff, #6366f1);"></div>
                </div>
            </div>
        </div>
        <div style="margin-top:20px;">
            <div class="class-btn" onclick="doorTransition(['Namkeen Batch'])">
                <div class="class-text">NAMKEEN BATCH 🍿</div>
                <div style="font-size:0.8rem; color:#888; margin-top:8px; font-weight:500;">TAP TO ACCESS LECTURES</div>
            </div>
        </div>
    </div>

    <!-- 📁 FOLDER SCREEN -->
    <div id="folder-screen" class="screen">
        <h3 id="folder-title" style="text-align:center; font-family:'Orbitron'; color:var(--primary); text-shadow: 0 0 15px var(--primary-glow); margin-bottom: 20px;">LIBRARY</h3>
        <div id="folder-list" style="margin-bottom: 10px;"></div>
        <div class="back-btn-modern" onclick="doorTransition(null, 'back')">⬅️ GO BACK</div>
    </div>

    <!-- 🎥 VIDEO SCREEN -->
    <div id="video-screen" class="screen" style="padding: 0; background: #050508;">
        
        <div class="top-bar-glass">
            <span onclick="closeVideo()" style="font-size: 1.4rem; color: var(--primary); cursor: pointer; margin-right: 15px; padding: 5px;">⬅️</span>
            <div style="font-size: 1.1rem; font-weight: 600; font-family:'Orbitron';">Video Player</div>
        </div>
        
        <div style="padding: 15px; padding-bottom: 40px;">
            
            <div id="video-container"></div>
            
            <div class="now-playing-box" style="margin-top: 15px;">
                <div class="np-badge">🔴 NOW PLAYING</div>
                <div id="np-title" class="np-title">Loading Lecture Title...</div>
            </div>

            <div class="section-heading">📂 Attachments & Materials</div>
            <div class="action-buttons-grid">
                <div id="offline-btn" class="premium-btn btn-offline action-btn-full" onclick="sendToChat('video')">
                    <span style="font-size: 1.3rem;">📥</span> Save Video Offline
                </div>
                <div id="pdf-btn" class="premium-btn btn-doc" onclick="sendToChat('pdf')">
                    <span style="font-size: 1.2rem;">📄</span> Class Notes
                </div>
                <div id="dpp-btn" class="premium-btn btn-doc" onclick="sendToChat('dpp')">
                    <span style="font-size: 1.2rem;">📝</span> Get DPP
                </div>
            </div>
        </div>
    </div>

    <!-- 👤 PROFILE SCREEN -->
    <div id="profile-screen" class="screen">
        <h2 style="text-align:center; font-family:'Orbitron'; color:var(--primary); margin-bottom:20px;">PROFILE</h2>
        <div class="glass-box" onclick="tg.openTelegramLink('https://t.me/errorkid_05')">
            <span style="font-size:1.5rem; margin-right:15px; text-shadow:0 0 10px var(--primary-glow);">📢</span> 
            <b>Join Official Channel</b>
        </div>
    </div>

    <!-- 📱 BOTTOM DOCK -->
    <div class="dock-container" id="main-dock">
        <div class="dock-item active-dock" onclick="switchTab('home', this)">🏠</div>
        <div class="dock-item" onclick="switchTab('profile', this)">👤</div>
    </div>

    <script>
        // 🔒 CORE LOGIC & FULLSCREEN/SWIPE FIXES
        const tg = window.Telegram.WebApp;
        tg.expand(); 
        
        try { if (tg.requestFullscreen) tg.requestFullscreen(); } catch(e) {}
        try {
            if (tg.disableVerticalSwipes) tg.disableVerticalSwipes(); 
            if (tg.enableClosingConfirmation) tg.enableClosingConfirmation(); 
        } catch(e) {}
        
        tg.setHeaderColor('#09090e');
        
        const user = tg.initDataUnsafe.user || {id: 8718760365, first_name: "Student"};
        if(document.getElementById('u-name')) document.getElementById('u-name').innerText = user.first_name;
        if(user.photo_url && document.getElementById('u-pic')) document.getElementById('u-pic').src = user.photo_url;
        
        let fullData = {}; let path = []; 
        let art = null; 
        let currentVid = null;

        // 🔄 API CALLS 
        fetch('/api/get_data').then(r=>r.json()).then(data=>{ fullData = data; });

        function showToast(msg) {
            let t = document.getElementById('toast'); t.innerText = msg; t.classList.add('show-toast');
            setTimeout(() => { t.classList.remove('show-toast'); }, 3000);
        }

        function doorTransition(p, action) {
            let door = document.getElementById('door-overlay'); door.classList.add('door-closed');
            setTimeout(() => {
                if(action === 'back') { back(); } else { nav(p); }
                setTimeout(() => { door.classList.remove('door-closed'); }, 500);
            }, 600);
        }

        function switchTab(t, btn) {
            document.querySelectorAll('.screen').forEach(s=>s.style.display='none');
            document.getElementById(t==='profile' ? 'profile-screen' : 'home-screen').style.display='flex';
            document.querySelectorAll('.dock-item').forEach(d=>d.classList.remove('active-dock'));
            if(btn) btn.classList.add('active-dock');
        }

        function nav(p) { path=p; document.querySelectorAll('.screen').forEach(s=>s.style.display='none'); document.getElementById('folder-screen').style.display='flex'; document.getElementById('main-dock').style.display='none'; renderFolder(); }
        
        function back() { 
            if(path.length > 1) { path.pop(); renderFolder(); } 
            else { document.querySelectorAll('.screen').forEach(s=>s.style.display='none'); document.getElementById('home-screen').style.display='flex'; document.getElementById('main-dock').style.display='flex'; } 
        }
        
        function renderFolder() {
            let ref = fullData; path.forEach(k => ref = ref[k]);
            let list = document.getElementById('folder-list'); list.innerHTML = ''; 
            if(!ref) return; document.getElementById('folder-title').innerText = path[path.length-1] || 'LIBRARY';

            if(ref.mode === 'video' && Array.isArray(ref.data)) {
                ref.data.forEach(vid => {
                    let d = document.createElement('div'); d.className = 'lecture-item';
                    d.innerHTML = `
                        <div style="display:flex; align-items:center; width:90%;">
                            <div class="play-icon-wrapper">▶️</div>
                            <div style="width:100%;">
                                <div style="font-weight:600; font-size:0.95rem; color:#fff; word-break: break-word; line-height: 1.3;">${vid.title}</div>
                                <div style="font-size:0.7rem; color:var(--primary); margin-top:4px; font-weight:500; letter-spacing:0.5px;">🎥 VIDEO LECTURE</div>
                            </div>
                        </div>
                        <span style="font-size: 1.2rem; color:#888;">⋮</span>
                    `;
                    d.onclick = () => playVideo(vid); list.appendChild(d);
                });
            } else {
                Object.keys(ref).forEach(k => {
                    if (k === 'mode' || k === 'data') return;
                    let d = document.createElement('div'); d.className = 'glass-box';
                    d.innerHTML = `<span style="font-size:1.6rem; margin-right:15px; text-shadow: 0 0 10px var(--primary-glow);">📁</span> <span style="font-weight:600; font-size:1.05rem; word-break: break-word;">${k}</span>`;
                    d.onclick = () => doorTransition([...path, k]);
                    
                    if(String(user.id) === "8718760365") {
                        let delBtn = document.createElement('span'); delBtn.innerText = '🗑️'; delBtn.style.marginLeft = 'auto'; delBtn.style.fontSize = '1.3rem';
                        delBtn.onclick = (e) => { e.stopPropagation(); deleteItem(k); }; d.appendChild(delBtn);
                    }
                    list.appendChild(d);
                });
            }
        }

        function deleteItem(target) {
            if(!confirm(`Delete "${target}" permanently?`)) return;
            fetch('/api/admin/delete', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({uid: user.id, path: path, target: target}) })
            .then(r => r.json()).then(d => { 
                if(d.status) { showToast("✅ Deleted!"); fetch('/api/get_data').then(res=>res.json()).then(data=>{ fullData=data; renderFolder(); }); } 
            });
        }

        // 🔥 ARTPLAYER INITIALIZATION & MAGIC LOGIC


// 🔥 MAGIC LOGIC: YOUTUBE + ARTPLAYER HYBRID
        function playVideo(vidInfo) {
            currentVid = vidInfo;
            document.querySelectorAll('.screen').forEach(s => s.style.display='none'); 
            document.getElementById('video-screen').style.display = 'flex';
            
            document.getElementById('np-title').innerText = vidInfo.title;
            document.getElementById('pdf-btn').style.display = (vidInfo.pdf && vidInfo.pdf !== "#") ? 'flex' : 'none';
            document.getElementById('dpp-btn').style.display = (vidInfo.dpp && vidInfo.dpp !== "#") ? 'flex' : 'none';

            let container = document.getElementById('video-container');
            let isYouTube = vidInfo.url.includes('youtube.com') || vidInfo.url.includes('youtu.be');

            if (isYouTube) {
                // 🔴 YOUTUBE VIDEO LOGIC
                if (art) { art.destroy(); art = null; } // Agar mp4 chal raha tha toh band karo
                
                // Link se Video ID nikalna
                let ytId = "";
                let match = vidInfo.url.match(/(?:youtu\.be\/|youtube\.com\/(?:embed\/|v\/|watch\?v=|watch\?.+&v=))((\w|-){11})/);
                if (match && match[1]) ytId = match[1];

                // YouTube ka asli Iframe Embed karna
                container.innerHTML = `<iframe width="100%" height="100%" src="https://www.youtube.com/embed/${ytId}?rel=0&modestbranding=1&autoplay=1" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen style="position:absolute; top:0; left:0; width:100%; height:100%;"></iframe>`;
            
            } else {
                // 🔵 NORMAL MP4 VIDEO LOGIC (Aapka Jhakas ArtPlayer)
                container.innerHTML = ''; // YouTube iframe ko hatao
                
                if (art) {
                    art.switchUrl(vidInfo.url, vidInfo.title);
                } else {
                    art = new Artplayer({
                        container: '#video-container',
                        url: vidInfo.url,
                        title: vidInfo.title,
                        theme: '#00e5ff',           
                        playbackRate: true,         
                        setting: true,              
                        fullscreen: false,       
                        fullscreenWeb: true,     
                        fastForward: true,          
                        lock: true,                 
                        autoPlayback: true,
                        dblclickFullscreen: false,  
                    });

                    // ⚡ ROTATED MATH FOR TIMELINE DRAG
                    let progressControl = art.template.$progress;
                    function fixRotatedSeek(e) {
                        if (!art.fullscreenWeb) return; 
                        e.preventDefault(); e.stopPropagation(); 
                        let clientY = e.touches ? e.touches[0].clientY : e.clientY;
                        let rect = progressControl.getBoundingClientRect();
                        let percentage = (rect.bottom - clientY) / rect.height;
                        percentage = Math.max(0, Math.min(1, percentage)); 
                        art.currentTime = percentage * art.duration; 
                    }
                    progressControl.addEventListener('touchstart', fixRotatedSeek, { capture: true, passive: false });
                    progressControl.addEventListener('touchmove', fixRotatedSeek, { capture: true, passive: false });
                    progressControl.addEventListener('mousedown', fixRotatedSeek, { capture: true, passive: false });
                    
                    let isDragging = false;
                    progressControl.addEventListener('mousedown', () => isDragging = true, { capture: true });
                    window.addEventListener('mouseup', () => isDragging = false, { capture: true });
                    progressControl.addEventListener('mousemove', (e) => { if (isDragging) fixRotatedSeek(e); }, { capture: true });

                    // ⚡ FLAWLESS DOUBLE TAP TO SEEK (-90deg FIX)
                    let lastTapTime = 0;
                    art.template.$player.addEventListener('pointerdown', function (e) {
                        if(e.target.closest('.art-bottom') || e.target.closest('.art-setting') || e.target.closest('.art-icon-lock') || e.target.closest('.art-layer-lock')) return;
                        
                        let currentTime = new Date().getTime();
                        let tapGap = currentTime - lastTapTime;
                        
                        if (tapGap < 300 && tapGap > 0) {
                            e.preventDefault(); e.stopPropagation(); 
                            let isForward = false;
                            
                            if (art.fullscreenWeb) isForward = e.clientY < (window.innerHeight / 2);
                            else isForward = e.clientX > (window.innerWidth / 2);

                            if (isForward) { art.currentTime += 10; showRipple('right', '10s ⏩'); } 
                            else { art.currentTime -= 10; showRipple('left', '⏪ 10s'); }
                            
                            lastTapTime = 0; return false;
                        }
                        lastTapTime = currentTime;
                    }, { capture: true });

                    // ⚡ ZOOM ROTATION FIX
                    art.on('fullscreenWeb', (state) => {
                        let vc = document.getElementById('video-container');
                        if(state) {
                            vc.classList.add('tg-landscape');
                            setTimeout(() => art.autoSize(), 150);
                            try { tg.HapticFeedback.impactOccurred('medium'); } catch(err){}
                        } else {
                            vc.classList.remove('tg-landscape');
                            setTimeout(() => {
                                art.autoSize();
                                try { tg.expand(); } catch(e){} 
                            }, 150);
                        }
                    });
                }
                art.play();
            }
        }

        function showRipple(side, text) {
            let ripple = document.createElement('div');
            ripple.className = `seek-ripple-container seek-${side}`;
            ripple.innerText = text;
            ripple.style.display = 'flex';
            art.template.$player.appendChild(ripple);
            setTimeout(() => { ripple.remove(); }, 500);
            try { tg.HapticFeedback.impactOccurred('light'); } catch(err){}
        }

        function sendToChat(type) {
            let urlToSend = type === 'video' ? currentVid.url : (type === 'pdf' ? currentVid.pdf : currentVid.dpp);
            showToast("⏳ Sending to Bot Chat...");
            fetch('/api/send_to_chat', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ uid: user.id, url: urlToSend, title: currentVid.title, type: type }) })
            .then(r=>r.json()).then(d=>{
                if(d.status) { showToast("✅ Sent successfully! Check Bot Chat."); try {tg.HapticFeedback.notificationOccurred('success');}catch(e){} }
                else { showToast("❌ Failed to send!"); }
            });
        }

        function closeVideo() { 
            // Video band karte time sab saaf kardo taaki background me awaz na aaye
            if(art) { art.destroy(); art = null; } 
            document.getElementById('video-container').innerHTML = ''; 
            
            document.querySelectorAll('.screen').forEach(s => s.style.display='none'); 
            document.getElementById('folder-screen').style.display='flex'; 
        }

        
    </script>
</body>
</html>
